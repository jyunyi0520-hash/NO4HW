<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司內部點餐工具</title>
    <link rel="stylesheet" href="all.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
</head>

<body>
    <div class="stars"></div>

    <div class="container">
        <header>
            <h1>🛸 宇宙航站點餐系統 🚀</h1>
            <div id="user-info" class="hidden">
                <span id="user-name"></span>
                <button id="sign-out-btn" class="btn btn-outline">登出艙門 🚪</button>
            </div>
        </header>

        <section id="login-section">
            <div class="card login-card">
                <h2 class="neon-text">準備進入軌道 🪐</h2>
                <p>請使用公司 Google 帳號進行身分驗證</p>
                <button id="custom-login-btn" class="custom-google-btn">
                    <span class="icon"></span>
                    <span class="text">啟動 Google 登入</span>
                </button>
            </div>
        </section>

        <section id="status-section" class="hidden">
            <div class="loader"></div>
            <p id="status-text">連線至宇宙廚房中... 🛰️</p>
        </section>

        <main id="app-section" class="hidden">

            <section id="admin-section" class="card hidden">
                <h3>👑 艦長控制台</h3>
                <div class="admin-controls">
                    <button id="btn-open-config" class="btn btn-secondary">設定今日登陸餐廳 🗺️</button>
                    <button id="btn-clear-orders" class="btn btn-danger">清空今日航行紀錄 🗑️</button>
                </div>
                <div id="admin-config-panel" class="hidden mt-3">
                    <h4>選擇今日開放餐廳：</h4>
                    <div id="restaurant-checkboxes" class="checkbox-group">
                        </div>
                    <button id="btn-save-config" class="btn btn-primary mt-2">儲存座標 💾</button>
                </div>
            </section>

            <section id="menu-section">
                <div class="menu-header">
                    <h2>📅 今日補給站 <span id="today-restaurants"></span></h2>
                    <input type="text" id="search-input" placeholder="🔍 搜尋餐點或餐廳..." class="search-bar">
                </div>
                
                <div id="menu-container" class="grid-container mt-3">
                    <p class="placeholder-text">今日尚未設定餐廳或菜單載入中...</p>
                </div>
            </section>
        </main>

        <section id="order-summary-section" class="hidden mt-3 text-center">
            <button id="btn-show-orders" class="btn btn-info glow-btn">📋 查看今日全艦訂單總覽</button>
        </section>

    </div>

    <div id="orders-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">×</span>
            <h2 class="neon-text">📋 今日補給清單</h2>
            <div class="table-wrapper">
                <table id="orders-table">
                    <thead>
                        <tr>
                            <th>時間</th>
                            <th>隊員</th>
                            <th>餐廳</th>
                            <th>餐點</th>
                            <th>數量</th>
                            <th>金額</th>
                            <th>備註</th>
                        </tr>
                    </thead>
                    <tbody id="orders-list">
                        </tbody>
                </table>
            </div>
            <div class="modal-footer">
                <p>總金額: <span id="total-amount" class="neon-text-sm">0</span> 宇宙幣</p>
                <button id="btn-copy-orders" class="btn btn-success">複製清單 (Line) 📝</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="all.js"></script>
</body>

</html>
